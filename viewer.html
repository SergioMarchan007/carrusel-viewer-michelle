<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Carrusel Michelle</title>
<style>
  :root {
    --crema: #F2EBE0;
    --vino: #5C0F1F;
    --negro: #1A1A1A;
    --gap: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .frame {
    position: relative;
    aspect-ratio: 4 / 5;
    height: 95vh;
    max-height: 95vh;
    max-width: 95vw;
    overflow: hidden;
    border-radius: 18px;
    background: #000;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6);
  }
  /* Carrusel principal */
  .track {
    display: flex;
    height: 100%;
    width: 100%;
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }
  .slide {
    flex: 0 0 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    user-drag: none;
    -webkit-user-drag: none;
  }
  /* Flechas */
  .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    color: #1A1A1A;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    backdrop-filter: blur(8px);
    transition: opacity 0.2s, transform 0.2s;
    z-index: 5;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .nav:hover { transform: translateY(-50%) scale(1.06); }
  .nav.prev { left: 16px; }
  .nav.next { right: 16px; }
  .nav.disabled { opacity: 0.25; pointer-events: none; }
  /* Indicadores */
  .dots {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 5;
    padding: 8px 14px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    border-radius: 100px;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: all 0.25s;
  }
  .dot.active {
    background: #fff;
    width: 22px;
    border-radius: 100px;
  }
  /* Contador top */
  .counter {
    position: absolute;
    top: 16px;
    right: 18px;
    z-index: 5;
    background: rgba(0,0,0,0.45);
    color: #fff;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    backdrop-filter: blur(6px);
  }
  /* Cuando arrastras */
  .track.dragging {
    transition: none;
    cursor: grabbing;
  }
  .frame.grabbing { cursor: grabbing; }
  .frame { cursor: grab; }
  /* Loading / error */
  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    padding: 32px;
    font-size: 15px;
    line-height: 1.5;
  }
  /* Pantallas pequeñas */
  @media (max-width: 600px) {
    .nav { width: 38px; height: 38px; font-size: 17px; }
    .nav.prev { left: 10px; }
    .nav.next { right: 10px; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="frame" id="frame">
    <div class="track" id="track"></div>
    <button class="nav prev" id="prev" aria-label="Anterior">‹</button>
    <button class="nav next" id="next" aria-label="Siguiente">›</button>
    <div class="counter" id="counter">1 / 1</div>
    <div class="dots" id="dots"></div>
    <div class="empty" id="empty" style="display:none;">
      Sin slides para mostrar.<br>
      Pasa <code>?slides=url1,url2,...</code> en la URL.
    </div>
  </div>
</div>

<script>
(function() {
  // Parsear slides desde la URL: ?slides=url1,url2,url3
  const params = new URLSearchParams(window.location.search);
  let slidesParam = params.get('slides') || '';

  // Permitir también JSON encoded como base64 si el list es largo
  let slides = [];
  if (slidesParam) {
    try {
      // Si viene en base64-encoded JSON
      if (slidesParam.startsWith('b64:')) {
        slides = JSON.parse(atob(slidesParam.slice(4)));
      } else {
        slides = slidesParam.split(',').map(s => s.trim()).filter(Boolean);
      }
    } catch (e) {
      console.error('Error parsing slides:', e);
    }
  }

  const track = document.getElementById('track');
  const counter = document.getElementById('counter');
  const dots = document.getElementById('dots');
  const empty = document.getElementById('empty');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  const frame = document.getElementById('frame');

  if (!slides.length) {
    empty.style.display = 'flex';
    prevBtn.style.display = 'none';
    nextBtn.style.display = 'none';
    counter.style.display = 'none';
    dots.style.display = 'none';
    return;
  }

  // Construir slides
  slides.forEach((url, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    const img = document.createElement('img');
    img.src = url;
    img.alt = `Slide ${i + 1}`;
    img.draggable = false;
    slide.appendChild(img);
    track.appendChild(slide);
  });

  // Construir dots
  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dots.appendChild(dot);
  });

  let current = 0;
  let isDragging = false;
  let startX = 0;
  let currentTranslate = 0;
  let trackWidth = 0;

  function updateUI() {
    track.style.transform = `translateX(-${current * 100}%)`;
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
    counter.textContent = `${current + 1} / ${slides.length}`;
    prevBtn.classList.toggle('disabled', current === 0);
    nextBtn.classList.toggle('disabled', current === slides.length - 1);
  }

  function go(idx) {
    current = Math.max(0, Math.min(slides.length - 1, idx));
    updateUI();
  }

  prevBtn.addEventListener('click', () => go(current - 1));
  nextBtn.addEventListener('click', () => go(current + 1));

  // Teclado: flechas izq/der
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') go(current - 1);
    else if (e.key === 'ArrowRight') go(current + 1);
  });

  // Swipe táctil + drag con mouse
  function onPointerDown(e) {
    isDragging = true;
    track.classList.add('dragging');
    frame.classList.add('grabbing');
    startX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
    trackWidth = frame.offsetWidth;
    currentTranslate = -current * trackWidth;
  }

  function onPointerMove(e) {
    if (!isDragging) return;
    const x = e.clientX || (e.touches && e.touches[0].clientX) || 0;
    const diff = x - startX;
    track.style.transform = `translateX(${currentTranslate + diff}px)`;
  }

  function onPointerUp(e) {
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('dragging');
    frame.classList.remove('grabbing');
    track.style.transform = '';   // dejar que CSS reaplique con transición
    const x = (e.clientX !== undefined ? e.clientX : (e.changedTouches && e.changedTouches[0].clientX)) || 0;
    const diff = x - startX;
    const threshold = trackWidth * 0.18;  // 18% del ancho para cambiar
    if (diff < -threshold) go(current + 1);
    else if (diff > threshold) go(current - 1);
    else updateUI();   // snap al actual
  }

  frame.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  frame.addEventListener('touchstart', onPointerDown, { passive: true });
  window.addEventListener('touchmove', onPointerMove, { passive: true });
  window.addEventListener('touchend', onPointerUp);

  // Prevenir el drag default de imágenes
  frame.addEventListener('dragstart', e => e.preventDefault());

  updateUI();
})();
</script>
</body>
</html>
